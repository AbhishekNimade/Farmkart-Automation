<!DOCTYPE html><html><head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Farmkart</title>
        <link href="img/logo/favicon.ico" title="farmkart.com" rel="icon">
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="font-awesome/css/font-awesome.css" rel="stylesheet">
        <link href="css/animate.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet">
        <link href="css/plugins/toastr/toastr.min.css" rel="stylesheet">
        <link href="css/plugins/select2/select2.min.css" rel="stylesheet">
        <link href="css/plugins/dualListbox/bootstrap-duallistbox.min.css" rel="stylesheet">
        <style>
            .bottomright {
                position: absolute;
                bottom: 8px;
                right: 16px;
                font-size: 18px;
            }
            .bottomleft {
                position: absolute;
                bottom: 8px;
                right: 16px;
                font-size: 18px;
                margin-left: 15px;
            }
        </style>
    </head>
    <body class="gray-bg_1" style="color: black">
        
        <span hidden="" id="resp_code"></span>
        
        <div class="text-center col-md-12 loginscreen">
            <div class="col-lg-4"></div>
            <div class="col-md-4" style="margin-top: 10%">
                <span>
                    <img alt="image" class="" src="img/logo/filogo.svg" height="150" width="150">
                </span>
                <h2><b style="color: white">Welcome to Farmkart</b></h2>
                <form class="m-t" role="form" action="AdminLogin" method="post" id="loginform">
                    <div class="form-group">
                        <input type="text" class="form-control" id="mobile" name="username" placeholder="Mobile or Email">
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password">
                    </div>
                    <button type="submit" class="btn btn-primary block full-width m-b">Login</button>
                    <!--<a href="Dashboard.jsp"><button type="button" class="btn btn-primary block full-width m-b">Login</button></a>-->
                </form>
                <a href="Client-forgot-password.jsp" style="color: white"><small>Forgot password?</small></a>
                <p class="m-t" style="color: white"> <small>Copyright © Farmkart 2018-19</small> </p>
            </div>            
        </div>
        <!-- Mainly scripts -->
        <script src="js/jquery-2.1.1.js"></script>
        <script src="js/bootstrap.min.js"></script>
        <script src="js/plugins/toastr/toastr.min.js"></script>
        <script src="js/plugins/select2/select2.full.min.js"></script>
        <script src="js/plugins/dualListbox/jquery.bootstrap-duallistbox.js">
        </script>        
        <script>
            function validation() {
                var mobile = $("#mobile").val();
                var password = $("#password").val();
                var pattern = /^\d{10}$/;
                var isvalid = pattern.test(mobile);
                if (mobile == '') {
                    toastr.error('Field Can Not be Empty', '');
                } else if (!isvalid) {
                    toastr.error('Enter Valid Mobile NO', '');
                } else if (password == '') {
                    toastr.error('Field Can Not be Empty', '');
                } else {
                    $("#loginform").submit();
                }
            }
        </script>
        <script>
            $(document).ready(function () {
                toastr.options = {
                    closeButton: true,
                    progressBar: true,
                    showMethod: 'slideDown',
                    timeOut: 4000
                };
                var resp = $("#resp_code").html();
                if (resp == "passError") {
                    toastr.error('Enter Correct Password', '');
                } else if (resp == "notExist") {
                    toastr.error('Account Does Not Exists', '');
                } else if (resp == "logout") {
                    toastr.success('Thanks for using Farmkart Panel', '');
                } else if (resp == "accountStatus") {
                    toastr.error('Account is not active now,Contact to admin', '');
                }
            });
        </script>
        

        

</body></html>
